# ─────────────────────────────────────────────────────────────────────────────
# Restful Booker API Automation Framework — Configuration Properties
# All environment-specific and API-related values are centralized here.
# NO HARDCODED values are permitted in test/API classes.
# ─────────────────────────────────────────────────────────────────────────────

# ── Environment Metadata ──────────────────────────────────────────────────────
environment=QA
application.name=Restful Booker API

# ── Base URL ──────────────────────────────────────────────────────────────────
# Target: Restful Booker public test API
base.url=https://restful-booker.herokuapp.com

# ── HTTP Headers ──────────────────────────────────────────────────────────────
content.type=application/json
accept.type=application/json

# ── Test Data File References ─────────────────────────────────────────────────
# File names are relative to src/test/resources/testdata/
testdata.valid.booking=booking.json

# ── Negative Test Data ────────────────────────────────────────────────────────
# Boundary / negative IDs for negative test scenarios
invalid.booking.id=999999999
boundary.booking.id=0

# ── Expected HTTP Status Codes ────────────────────────────────────────────────
status.code.ok=200
status.code.not.found=404
status.code.server.error=500

# ── Report Configuration ──────────────────────────────────────────────────────
report.output.dir=test-output
report.title=Restful Booker API — Test Execution Report
report.name=API Automation Report
